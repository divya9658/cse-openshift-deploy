apiVersion: apps/v1
kind: Deployment
metadata:
  name: Springboot-openshift
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cseoc-app
  template:
    metadata:
      labels:
        app: cseoc-app
    spec:
      containers:
      - name: springboot-openshift
        image: divya12/cseoc:latest
        ports:
        - containerPort: 8085